<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GPEQ — Grosse Pointe Exterior</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue: #003CFF;
      --blue-pale: #e8edff;
      --text: #111;
      --muted: #777;
      --border: #e2e2e2;
      --bg: #f4f4f6;
      --white: #fff;
      --red: #c0392b;
      --radius: 14px;
      --shadow: 0 2px 10px rgba(0,0,0,0.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .hdr {
      background: var(--blue); color: #fff;
      padding: 14px 18px 12px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .hdr-title { font-size: 17px; font-weight: 700; }
    .hdr-sub   { font-size: 10px; opacity: .75; text-transform: uppercase; letter-spacing: .8px; margin-top: 1px; }
    .hdr-btn   { background: rgba(255,255,255,.18); border: none; color: #fff; font-size: 13px; font-weight: 600; padding: 7px 13px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
    .hdr-btn-ghost { background: none; border: none; color: #fff; font-size: 13px; font-weight: 600; padding: 7px 4px; border-radius: 8px; cursor: pointer; }

    /* ── Screens ── */
    .screen { padding: 20px; padding-bottom: 110px; }

    /* ── Login ── */
    .login-top { text-align: center; padding: 44px 20px 28px; }
    .login-logo { font-size: 30px; font-weight: 900; color: var(--blue); letter-spacing: 3px; }
    .login-sub  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 4px; }
    .login-prompt { font-size: 15px; font-weight: 600; text-align: center; margin-bottom: 18px; }
    .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .user-card {
      background: #fff; border: 2px solid var(--border); border-radius: var(--radius);
      padding: 22px 12px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
      font-size: 17px; font-weight: 600;
    }
    .user-card:active { transform: scale(.95); border-color: var(--blue); background: var(--blue-pale); }
    .user-initial {
      width: 50px; height: 50px; border-radius: 50%;
      border: 2px solid var(--blue); color: var(--blue);
      font-size: 22px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
    }

    /* ── Buttons ── */
    .btn {
      display: block; width: 100%; padding: 15px; border-radius: var(--radius);
      font-size: 16px; font-weight: 600; cursor: pointer; border: none; text-align: center;
      transition: transform .1s, opacity .1s;
    }
    .btn:active { transform: scale(.98); opacity: .9; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-outline { background: #fff; color: var(--blue); border: 2px solid var(--blue); }
    .btn-ghost   { background: #fff; color: var(--muted); border: 2px solid var(--border); }
    .mt-10 { margin-top: 10px; }
    .mt-14 { margin-top: 14px; }

    /* ── Cards ── */
    .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 14px; }

    /* ── Forms ── */
    .form-lbl { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .form-inp  { width: 100%; padding: 13px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; background: #fff; transition: border-color .15s; }
    .form-inp:focus { border-color: var(--blue); }
    .form-grp { margin-bottom: 15px; }

    /* ── Quoting overview section cards ── */
    .sec-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px; cursor: pointer; background: #fff;
      border-radius: var(--radius); box-shadow: var(--shadow);
      margin-bottom: 12px; transition: background .1s, transform .1s;
    }
    .sec-nav:active { background: var(--blue-pale); transform: scale(.98); }
    .sec-nav-title { font-size: 17px; font-weight: 700; }
    .sec-nav-meta  { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .sec-nav-right { display: flex; align-items: center; gap: 10px; }
    .sec-badge { background: var(--blue); color: #fff; border-radius: 20px; padding: 3px 11px; font-size: 12px; font-weight: 700; }
    .sec-arrow { font-size: 18px; color: var(--muted); }

    /* ── Full-screen section view ── */
    .sec-screen { padding: 16px; padding-bottom: 90px; }

    /* ── Window buttons (full-screen, large) ── */
    .win-grid-full { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .win-btn-full {
      background: #fff; border: 2px solid var(--border);
      border-radius: 14px; padding: 24px 14px;
      cursor: pointer; text-align: center;
      transition: border-color .15s, background .15s, transform .1s;
      position: relative;
    }
    .win-btn-full:active { transform: scale(.93); border-color: var(--blue); background: var(--blue-pale); }
    .win-btn-full-lbl   { font-size: 16px; font-weight: 700; display: block; line-height: 1.3; }
    .win-btn-full-price { font-size: 14px; color: var(--muted); display: block; margin-top: 5px; }
    .win-btn-full-badge {
      position: absolute; top: -9px; right: -9px;
      background: var(--blue); color: #fff; border-radius: 50%;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }

    /* ── Window list ── */
    .win-list-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 8px; }
    .win-list { background: var(--bg); border-radius: 12px; overflow: hidden; }
    .win-item {
      display: flex; align-items: center;
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .win-item:last-child { border-bottom: none; }
    .win-item:active { background: var(--blue-pale); }
    .win-item-info { flex: 1; }
    .win-item-type  { font-size: 14px; font-weight: 600; }
    .win-item-addon { font-size: 12px; color: var(--blue); margin-top: 3px; }
    .win-item-addon.none { color: var(--muted); }
    .win-item-price { font-size: 14px; font-weight: 700; color: var(--blue); margin-right: 12px; }
    .win-item-del   { background: none; border: none; color: var(--muted); font-size: 19px; cursor: pointer; padding: 4px; line-height: 1; }

    /* ── Power wash rows ── */
    .pw-card { background: #fff; border-radius: 12px; padding: 4px 0; margin-bottom: 14px; box-shadow: var(--shadow); overflow: hidden; }
    .pw-row  { display: flex; align-items: center; gap: 12px; padding: 15px 16px; border-bottom: 1px solid var(--border); }
    .pw-row:last-child { border-bottom: none; }
    .pw-lbl  { font-size: 15px; font-weight: 600; }
    .pw-rate { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .pw-inp  { width: 96px; padding: 10px 12px; border: 2px solid var(--border); border-radius: 9px; font-size: 16px; text-align: right; outline: none; transition: border-color .15s; }
    .pw-inp:focus { border-color: var(--blue); }
    .pw-total { width: 66px; text-align: right; font-size: 14px; font-weight: 700; color: var(--blue); }

    /* ── Section bottom bar (Done / subtotal) ── */
    .sec-bar {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: #fff; border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 90; box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
    }
    .sec-bar-lbl  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .sec-bar-amt  { font-size: 22px; font-weight: 800; color: var(--blue); }
    .done-btn {
      background: var(--blue); color: #fff; border: none;
      border-radius: 10px; padding: 13px 28px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .done-btn:active { opacity: .85; }

    /* ── Quoting overview total bar ── */
    .total-bar {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: #fff; border-top: 1px solid var(--border);
      padding: 11px 18px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 90; box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
    }
    .total-lbl    { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .total-amount { font-size: 24px; font-weight: 800; color: var(--blue); }
    .complete-btn {
      background: var(--blue); color: #fff; border: none;
      border-radius: 10px; padding: 13px 22px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .complete-btn:active { opacity: .85; }

    /* ── Addon popup (BIGGER) ── */
    .addon-popup {
      position: fixed;
      bottom: -200px;
      left: 50%; transform: translateX(-50%);
      width: calc(100% - 20px); max-width: 410px;
      background: #fff; border-radius: 22px;
      box-shadow: 0 -4px 40px rgba(0,0,0,.18);
      padding: 20px 16px 24px;
      z-index: 200;
      transition: bottom .25s cubic-bezier(.34,1.56,.64,1);
    }
    .addon-popup.show { bottom: 86px; }
    .addon-popup-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .addon-popup-sub   { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .addon-btns { display: flex; gap: 10px; }
    .addon-btn {
      flex: 1; background: var(--blue-pale); color: var(--blue);
      border: 2px solid var(--blue); border-radius: 12px;
      padding: 16px 6px; font-size: 15px; font-weight: 700;
      cursor: pointer; text-align: center;
      transition: background .1s, color .1s; line-height: 1.3;
    }
    .addon-btn:active { background: var(--blue); color: #fff; }
    .addon-btn.skip   { background: #fff; color: var(--muted); border-color: var(--border); }
    .addon-sub { font-size: 12px; font-weight: 500; display: block; margin-top: 4px; }

    /* ── Summary ── */
    .price-card {
      background: var(--blue); color: #fff;
      border-radius: var(--radius); padding: 24px 20px;
      text-align: center; margin-bottom: 16px;
    }
    .price-card-lbl   { font-size: 11px; opacity: .8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .price-card-range { font-size: 34px; font-weight: 900; letter-spacing: -.5px; }
    .price-card-calc  { font-size: 14px; opacity: .85; margin-top: 6px; }
    .price-card-note  { font-size: 11px; opacity: .65; margin-top: 3px; }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: #fff; border-radius: 10px; padding: 14px; text-align: center; box-shadow: var(--shadow); }
    .stat-val  { font-size: 28px; font-weight: 900; color: var(--blue); }
    .stat-lbl  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

    .chart-wrap { position: relative; height: 210px; margin-bottom: 4px; }

    .sum-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 10px; }
    .sum-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .sum-row:last-child { border-bottom: none; }
    .sum-row-lbl { flex: 1; }
    .sum-row-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .sum-row-amt { font-weight: 700; color: var(--blue); }
    .sum-total-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }

    .warn-banner { background: #fff8e1; border: 1.5px solid #f0c040; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #7a5a00; margin-bottom: 14px; line-height: 1.4; }

    /* ── History ── */
    .hist-card { background: #fff; border-radius: var(--radius); padding: 15px; margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer; }
    .hist-top  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .hist-name { font-size: 16px; font-weight: 700; }
    .hist-amt  { font-size: 18px; font-weight: 800; color: var(--blue); }
    .hist-meta { font-size: 12px; color: var(--muted); }
    .hist-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 9px; }
    .hist-badge { background: var(--blue-pale); color: var(--blue); border-radius: 7px; padding: 3px 10px; font-size: 11px; font-weight: 700; }
    .del-btn { background: #fdf0f0; color: var(--red); border: 1.5px solid #f5c6c2; border-radius: 7px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }

    /* ── Modal sheet ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; display: flex; align-items: flex-end; }
    .modal-sheet   { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 44px; width: 100%; max-width: 430px; margin: 0 auto; }
    .modal-title   { font-size: 18px; font-weight: 700; margin-bottom: 18px; }

    /* ── Settings ── */
    .settings-section { margin-bottom: 24px; }
    .settings-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--muted); margin-bottom: 10px; }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .settings-row:first-of-type { border-radius: 12px 12px 0 0; }
    .settings-row:last-of-type  { border-radius: 0 0 12px 12px; border-bottom: none; }
    .settings-row:only-of-type  { border-radius: 12px; border-bottom: none; }
    .settings-row-lbl { font-size: 15px; font-weight: 500; }
    .settings-inp {
      width: 90px; text-align: right; padding: 8px 10px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: 16px; font-weight: 600; outline: none;
      transition: border-color .15s;
    }
    .settings-inp:focus { border-color: var(--blue); }
    .settings-prefix { font-size: 14px; color: var(--muted); margin-right: 4px; }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 76px;
      left: 50%; transform: translateX(-50%) translateY(-8px);
      background: #1a1a1a; color: #fff;
      padding: 9px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500; z-index: 400;
      opacity: 0; pointer-events: none;
      transition: opacity .18s, transform .18s; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Misc ── */
    .empty { text-align: center; padding: 56px 20px; color: var(--muted); }
    .empty-icon { width: 54px; height: 54px; border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
    .dash-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .dash-sub  { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
    .section-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 11px; margin-top: 22px; }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  </style>
</head>
<body>

<div id="app"></div>

<!-- Addon popup lives outside #app so re-renders don't destroy it -->
<div id="addon-popup" class="addon-popup">
  <div class="addon-popup-title" id="addon-popup-title">Add upgrade</div>
  <div class="addon-popup-sub" id="addon-popup-sub">Tap an option or it will dismiss automatically</div>
  <div class="addon-btns">
    <button class="addon-btn" onclick="applyAddon('storm')">Storm<span class="addon-sub" id="addon-storm-price">+$3</span></button>
    <button class="addon-btn" onclick="applyAddon('screen')">Screen<span class="addon-sub" id="addon-screen-price">+$2</span></button>
    <button class="addon-btn" onclick="applyAddon('both')">Storm &amp; Screen<span class="addon-sub" id="addon-both-price">+$4</span></button>
    <button class="addon-btn skip" onclick="hideAddon()">Skip</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ─── Users ────────────────────────────────────────────────────────────────────
const USERS = ['Seamus', 'George', 'Mikey', 'Jackson'];

// ─── Pricing (loaded from localStorage, falls back to defaults) ───────────────
const PRICING_DEFAULTS = {
  regular: 7, small: 6, large: 9,
  storm: 3, screen: 2, both: 4,
  driveway: 0.20, patio: 0.25, brick: 0.30,
  range: 40,
};

function loadPricing() {
  try {
    const saved = JSON.parse(localStorage.getItem('gpeq_pricing') || 'null');
    return saved ? { ...PRICING_DEFAULTS, ...saved } : { ...PRICING_DEFAULTS };
  } catch { return { ...PRICING_DEFAULTS }; }
}

function savePricing(p) {
  localStorage.setItem('gpeq_pricing', JSON.stringify(p));
}

// ─── Labels ───────────────────────────────────────────────────────────────────
const WIN_LABELS  = { regular: 'Regular Window', small: 'Small Window', large: 'Large / Complicated', specialty: 'Specialty' };
const ADDON_LABELS = { storm: 'Storm Window', screen: 'Screen', both: 'Storm & Screen' };
const PW_LABELS   = { driveway: 'Driveway', patio: 'Patio', brick: 'Brick/Masonry' };

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  view: 'login',
  user: null,
  quote: null,
  pricing: loadPricing(),
  historyList: JSON.parse(localStorage.getItem('gpeq_v1') || '[]'),
  addonTarget: null,
  addonTimer: null,
};

function newQuote() {
  return {
    id: Date.now() + '_' + Math.random().toString(36).slice(2),
    createdBy: state.user,
    createdAt: new Date().toISOString(),
    customer: { name: '', address: '', phone: '' },
    windows: [],
    pw: { driveway: '', patio: '', brick: '', specPrice: '', specDesc: '' },
    gutters: { price: '', notes: '' },
    notes: '',
  };
}

// ─── Calculations ─────────────────────────────────────────────────────────────
function winPrice(w) {
  const p = state.pricing;
  const base = w.type === 'specialty' ? (Number(w.customPrice) || 0) : p[w.type];
  const addonCost = w.addon ? p[w.addon] : 0;
  return base + addonCost;
}

function pwTotal(pw) {
  const p = state.pricing;
  return (Number(pw.driveway) || 0) * p.driveway
       + (Number(pw.patio)    || 0) * p.patio
       + (Number(pw.brick)    || 0) * p.brick
       + (Number(pw.specPrice)|| 0);
}

function quoteTotal(q) {
  return q.windows.reduce((s, w) => s + winPrice(w), 0)
       + pwTotal(q.pw)
       + (Number(q.gutters.price) || 0);
}

function saveHistory() {
  localStorage.setItem('gpeq_v1', JSON.stringify(state.historyList));
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function go(view) {
  state.view = view;
  render();
  window.scrollTo(0, 0);
}

// Re-render current view without scrolling to top (used after adding/removing items)
function refreshCurrent() {
  const scrollY = window.scrollY;
  const map = {
    quoting: renderQuoting,
    'win-section': renderWinSection,
    'pw-section': renderPWSection,
    'gut-section': renderGutSection,
  };
  const fn = map[state.view];
  if (!fn) return;
  document.getElementById('app').innerHTML = fn();
  window.scrollTo(0, scrollY);
}

// ─── Addon popup ──────────────────────────────────────────────────────────────
function showAddon(windowId, label) {
  const p = state.pricing;
  state.addonTarget = windowId;
  document.getElementById('addon-popup-title').textContent = label;
  document.getElementById('addon-popup-sub').textContent = 'Add upgrade — tap an option or it will dismiss';
  document.getElementById('addon-storm-price').textContent  = '+$' + p.storm;
  document.getElementById('addon-screen-price').textContent = '+$' + p.screen;
  document.getElementById('addon-both-price').textContent   = '+$' + p.both;
  document.getElementById('addon-popup').classList.add('show');
  clearTimeout(state.addonTimer);
  state.addonTimer = setTimeout(hideAddon, 2000);
}

function hideAddon() {
  document.getElementById('addon-popup').classList.remove('show');
  clearTimeout(state.addonTimer);
  state.addonTarget = null;
}

function applyAddon(type) {
  if (!state.addonTarget) return;
  const w = state.quote.windows.find(w => w.id === state.addonTarget);
  if (w) w.addon = type;
  hideAddon();
  refreshCurrent();
  toast(ADDON_LABELS[type] + ' added');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const views = {
    login: renderLogin, dashboard: renderDashboard,
    'cust-info': renderCustInfo, quoting: renderQuoting,
    'win-section': renderWinSection, 'pw-section': renderPWSection, 'gut-section': renderGutSection,
    summary: renderSummary, history: renderHistory, settings: renderSettings,
  };

function countWin(type) { return state.quote.windows.filter(w => w.type === type).length; }

function addWin(type) {
  const id = Date.now() + '_' + Math.random().toString(36).slice(2);
  state.quote.windows.push({ id, type, label: WIN_LABELS[type], addon: null });
  refreshCurrent();
  showAddon(id, WIN_LABELS[type]);
}

function removeWin(id) {
  state.quote.windows = state.quote.windows.filter(w => w.id !== id);
  refreshCurrent();
}

function editAddon(id) {
  const w = state.quote.windows.find(w => w.id === id);
  if (w) showAddon(id, w.label || WIN_LABELS[w.type]);
}

function openSpecModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'spec-modal';
  overlay.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-title">Specialty Window</div>
      <div class="form-grp">

      </div>

      <button class="btn btn-ghost mt-10" onclick="document.getElementById('spec-modal').remove()">Cancel</button>

  `;

  setTimeout(() => document.getElementById('spec-desc').focus(), 50);
}

function addSpecWin() {
  const desc  = document.getElementById('spec-desc').value.trim() || 'Specialty Window';
  const price = parseFloat(document.getElementById('spec-price').value) || 0;
  const id = Date.now() + '_' + Math.random().toString(36).slice(2);
  state.quote.windows.push({ id, type: 'specialty', label: desc, customPrice: price, addon: null });

  refreshCurrent();
  showAddon(id, desc);

        ${settingsRow('Price Range Buffer', 'range', p.range, '±$')}

      <button class="btn btn-ghost mt-10" onclick="resetSettings()">Reset to Defaults</button>
    </div>
  `;
}

function settingsRow(label, key, value, prefix, isDecimal) {
  const step = isDecimal ? '0.01' : '1';
  return `
    <div class="settings-row">
      <div class="settings-row-lbl">${label}</div>
      <div style="display:flex;align-items:center">
        <span class="settings-prefix">${prefix}</span>
        <input class="settings-inp" type="number" id="setting-${key}"
          value="${value}" step="${step}" min="0" inputmode="decimal">
      </div>
    </div>
  `;
}

function saveSettings() {
  const keys = ['regular','small','large','storm','screen','both','driveway','patio','brick','range'];
  const newPricing = {};
  for (const key of keys) {
    const el = document.getElementById('setting-' + key);
    const val = parseFloat(el.value);
    if (isNaN(val) || val < 0) { toast('Enter valid prices (0 or above)'); return; }
    newPricing[key] = val;
  }
  state.pricing = newPricing;
  savePricing(newPricing);
  toast('Settings saved');
  setTimeout(() => go('dashboard'), 600);
}

function resetSettings() {
  state.pricing = { ...PRICING_DEFAULTS };
  savePricing(state.pricing);
  toast('Prices reset to defaults');
  go('settings');
}

            </div>
          `).join('')}
          ${q.pw.specPrice ? `
            <div class="sum-row">
              <div class="sum-row-lbl">
                <div>Specialty</div>
                ${q.pw.specDesc ? `<div class="sum-row-sub">${esc(q.pw.specDesc)}</div>` : ''}
              </div>
              <div class="sum-row-amt">$${Number(q.pw.specPrice).toFixed(2)}</div>
            </div>
          ` : ''}
          <div class="sum-row" style="font-weight:800">
            <div class="sum-row-lbl">Subtotal</div>
            <div class="sum-row-amt">$${pwT.toFixed(2)}</div>
          </div>
        </div>
      ` : ''}

      ${gutT > 0 ? `
        <div class="card" style="padding:16px">
          <div class="sum-lbl">Gutters</div>
          <div class="sum-row">
            <div class="sum-row-lbl">
              <div>Gutter Cleaning</div>
              ${q.gutters.notes ? `<div class="sum-row-sub">${esc(q.gutters.notes)}</div>` : ''}
            </div>
            <div class="sum-row-amt">$${gutT.toFixed(2)}</div>
          </div>
        </div>
      ` : ''}

      ${(q.customer.name || q.customer.address || q.customer.phone) ? `
        <div class="card" style="padding:16px">
          <div class="sum-lbl">Customer</div>
          ${q.customer.name    ? `<div class="sum-row"><div class="sum-row-lbl">Name</div><div>${esc(q.customer.name)}</div></div>` : ''}
          ${q.customer.address ? `<div class="sum-row"><div class="sum-row-lbl">Address</div><div>${esc(q.customer.address)}</div></div>` : ''}
          ${q.customer.phone   ? `<div class="sum-row"><div class="sum-row-lbl">Phone</div><div>${esc(q.customer.phone)}</div></div>` : ''}
        </div>
      ` : ''}

      ${q.notes ? `
        <div class="card" style="padding:16px">
          <div class="sum-lbl">Notes</div>
          <div style="font-size:14px;line-height:1.5">${esc(q.notes)}</div>
        </div>
      ` : ''}

      <div class="card" style="padding:16px;border:2px solid var(--blue)">
        <div class="sum-total-row">
          <div style="font-size:18px;font-weight:800">Total</div>
          <div style="font-size:30px;font-weight:900;color:var(--blue)">$${total.toFixed(2)}</div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">
          Quoted by ${esc(q.createdBy)} &middot; ${fmtDate(q.createdAt)}
        </div>
      </div>

      <button class="btn btn-primary mt-14" onclick="saveQuote()">Save Quote</button>
      <button class="btn btn-outline mt-10" onclick="shareQuote()">Share / Export</button>
      <button class="btn btn-ghost mt-10" onclick="go('quoting')">Edit Quote</button>
    </div>
  `;
}

function initCharts() {
  const q = state.quote;
  const wT  = q.windows.reduce((s, w) => s + winPrice(w), 0);
  const pwT = pwTotal(q.pw);
  const gutT = Number(q.gutters.price) || 0;

  const bEl = document.getElementById('chart-breakdown');
  if (bEl) {
    const labels = [], data = [];
    if (wT  > 0) { labels.push('Windows');      data.push(wT);  }
    if (pwT > 0) { labels.push('Power Washing'); data.push(pwT); }
    if (gutT> 0) { labels.push('Gutters');       data.push(gutT);}
    new Chart(bEl, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: ['#003CFF','#4d72ff','#99aaff'], borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 16, font: { size: 12 } } } } },
    });
  }

  const wEl = document.getElementById('chart-windows');
  if (wEl) {
    const counts = {};
    q.windows.forEach(w => {
      const lbl = w.label || WIN_LABELS[w.type];
      counts[lbl] = (counts[lbl] || 0) + 1;
    });
    new Chart(wEl, {
      type: 'bar',
      data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: '#003CFF', borderRadius: 6 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { grid: { display: false } } },
      },
    });
  }
}

function saveQuote() {
  const q = state.quote;
  state.historyList = state.historyList.filter(h => h.id !== q.id);
  state.historyList.unshift(q);
  saveHistory();
  toast('Quote saved');
  setTimeout(() => go('dashboard'), 700);
}

function shareQuote() {
  const q = state.quote;
  const p = state.pricing;
  const total = quoteTotal(q);
  const low = Math.max(0, total - p.range);
  const high = total + p.range;

  let txt = 'GROSSE POINTE EXTERIOR — QUOTE\n================================\n';
  if (q.customer.name)    txt += `Customer: ${q.customer.name}\n`;
  if (q.customer.address) txt += `Address:  ${q.customer.address}\n`;
  if (q.customer.phone)   txt += `Phone:    ${q.customer.phone}\n`;
  txt += `Date: ${fmtDate(q.createdAt)} — By: ${q.createdBy}\n\n`;

  if (q.windows.length) {
    txt += 'WINDOWS\n';
    q.windows.forEach((w, i) => {
      txt += `  ${w.label || WIN_LABELS[w.type]} #${i+1}: $${winPrice(w).toFixed(2)}`;
      if (w.addon) txt += ` (+ ${ADDON_LABELS[w.addon]})`;
      txt += '\n';
    });
    txt += '\n';
  }

  const pwT = pwTotal(q.pw);
  if (pwT > 0) {
    txt += 'POWER WASHING\n';
    ['driveway','patio','brick'].filter(k => Number(q.pw[k]) > 0).forEach(k => {
      txt += `  ${PW_LABELS[k]}: ${q.pw[k]} sq ft = $${((Number(q.pw[k])||0)*p[k]).toFixed(2)}\n`;
    });
    if (q.pw.specPrice) txt += `  Specialty: $${Number(q.pw.specPrice).toFixed(2)}\n`;
    txt += '\n';
  }

  if (Number(q.gutters.price) > 0) txt += `GUTTERS: $${Number(q.gutters.price).toFixed(2)}\n\n`;
  if (q.notes) txt += `Notes: ${q.notes}\n\n`;
  txt += `CALCULATED TOTAL:  $${total.toFixed(2)}\n`;
  txt += `RECOMMENDED RANGE: $${low.toFixed(0)} — $${high.toFixed(0)}\n`;

  if (navigator.share) {
    navigator.share({ title: 'GPE Quote', text: txt }).catch(() => {});
  } else {
    navigator.clipboard.writeText(txt)
      .then(() => toast('Quote copied to clipboard'))
      .catch(() => toast('Copy failed — try again'));
  }
}

// ─── History ──────────────────────────────────────────────────────────────────
function renderHistory() {
  const list = state.historyList;
  return `
    <div class="hdr">
      <button class="hdr-btn" onclick="go('dashboard')">Back</button>
      <div style="text-align:right">
        <div class="hdr-title">Quote History</div>
        <div class="hdr-sub">${list.length} quote${list.length !== 1 ? 's' : ''}</div>
      </div>
    </div>
    <div class="screen">
      ${list.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="3"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/>
            </svg>
          </div>
          <div class="empty-title">No quotes yet</div>
          <div>Saved quotes will appear here</div>
        </div>
      ` : list.map(q => histCard(q, true)).join('')}
    </div>
  `;
}

function histCard(q, showDel) {
  const total = quoteTotal(q);
  return `
    <div class="hist-card" onclick="viewQuote('${q.id}')">
      <div class="hist-top">
        <div class="hist-name">${esc(q.customer.name || 'Unnamed Customer')}</div>
        <div class="hist-amt">$${total.toFixed(2)}</div>
      </div>
      <div class="hist-meta">${q.customer.address ? esc(q.customer.address) + ' &middot; ' : ''}${fmtDate(q.createdAt)}</div>
      <div class="hist-foot">
        <span class="hist-badge">${esc(q.createdBy)}</span>
        ${showDel ? `<button class="del-btn" onclick="event.stopPropagation();deleteQuote('${q.id}')">Delete</button>` : ''}
      </div>
    </div>
  `;
}

function viewQuote(id) {
  const q = state.historyList.find(h => h.id === id);
  if (!q) return;
  state.quote = JSON.parse(JSON.stringify(q));
  go('summary');
}

function deleteQuote(id) {
  state.historyList = state.historyList.filter(h => h.id !== id);
  saveHistory();
  document.getElementById('app').innerHTML = renderHistory();
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
